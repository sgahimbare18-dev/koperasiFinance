<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koperasi Finance - Test Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #2c3e50; }
    .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 24px; }
    .btn { background: #4544ab; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
    .btn:hover { background: #3d3b9a; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(69,68,171,0.3); }
    .btn.secondary { background: #6c757d; }
    .btn.secondary:hover { background: #5a6268; }
    .btn.warning { background: #ffc107; color: #212529; }
    .btn.warning:hover { background: #e0a800; }
    .input { width: 100%; padding: 12px 16px; border: 2px solid #e1e8ed; border-radius: 8px; font-size: 1rem; transition: all 0.3s ease; }
    .input:focus { border-color: #4544ab; outline: none; box-shadow: 0 0 0 3px rgba(69,68,171,0.1); }
    .flex-row { display: flex; gap: 12px; align-items: center; }
    .user-info-panel { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 16px; margin-bottom: 24px; }
    .badge { background: #28a745; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
    .google-btn { background: #4285f4; }
    .google-btn:hover { background: #3367d6; }
    .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .table th, .table td { padding: 8px; text-align: left; border-bottom: 1px solid #e1e8ed; }
    .table th { background: #f8f9fa; font-weight: 600; }
    .loading { text-align: center; padding: 20px; color: #6c757d; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4544ab; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app-container" id="appRoot">
    <div class="card" style="max-width: 600px; margin: 40px auto; text-align: center;">
      <h1 style="margin-bottom: 40px; color: #4544ab; font-size: 2.5rem;">Koperasi Finance</h1>
      <p style="margin-bottom: 32px; font-size: 1.1rem; color: #6c757d;">Welcome to Koperasi Finance</p>
      <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
        <button class="btn" onclick="showEmailLogin()">Sign In</button>
        <button class="btn secondary" onclick="showSignUp()">Create Account</button>
      </div>
      <button class="btn google-btn" onclick="handleGoogleSignIn()" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#ffffff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#ffffff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        </svg>
        Sign in with Google
      </button>
      <div id="messageArea"></div>
    </div>
  </div>

  <script>
    console.log('Portal loaded successfully');
    
    // Initialize Supabase
    const supabaseClient = window.supabase.createClient(
      'https://vkcjwovhnmluzqkgqrbk.supabase.co',
      'sb_publishable_d-klXw8ji6Q0lfm2T7rnTQ_c755YAT6'
    );

    let currentUser = null;
    let loginFlowState = 'initial';

    function showEmailLogin() {
      console.log('Showing email login screen');
      const root = document.getElementById('appRoot');
      root.innerHTML = `
        <div class="card" style="max-width: 450px; margin: 40px auto; text-align: center;">
          <button class="logout-btn" onclick="showWelcome()">← Back</button>
          <h2 style="margin: 20px 0;">Sign In</h2>
          <div style="margin-top: 20px;">
            <input type="email" id="loginEmail" placeholder="Email address" class="input" style="margin-bottom: 12px;" />
            <input type="password" id="loginPassword" placeholder="Password" class="input" />
            <button class="btn" onclick="handleEmailLogin()" style="margin-top: 20px; width: 100%;">Sign In</button>
          </div>
          <div id="messageArea"></div>
        </div>
      `;
      loginFlowState = 'emailLogin';
    }

    function showSignUp() {
      console.log('Showing signup screen');
      const root = document.getElementById('appRoot');
      root.innerHTML = `
        <div class="card" style="max-width: 500px; margin: 40px auto; text-align: center;">
          <button class="logout-btn" onclick="showWelcome()">← Back</button>
          <h2 style="margin: 20px 0;">Create Account</h2>
          <div style="margin-top: 20px;">
            <input type="text" id="signupFullName" placeholder="Full Name" class="input" style="margin-bottom: 12px;" />
            <input type="email" id="signupEmail" placeholder="Email address" class="input" style="margin-bottom: 12px;" />
            <input type="tel" id="signupPhone" placeholder="Phone Number" class="input" style="margin-bottom: 12px;" />
            <input type="password" id="signupPassword" placeholder="Password" class="input" style="margin-bottom: 12px;" />
            <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" class="input" style="margin-bottom: 12px;" />
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
              <label style="display: flex; align-items: center; font-size: 0.9rem;">
                <input type="checkbox" id="agreeTerms" style="margin-right: 8px;">
                I agree to Terms of Service and Privacy Policy
              </label>
            </div>
            <button class="btn" onclick="handleSignUp()" style="margin-top: 20px; width: 100%;">Create Account</button>
          </div>
          <div id="messageArea"></div>
        </div>
      `;
      loginFlowState = 'signUp';
    }

    function showWelcome() {
      console.log('Showing welcome screen');
      loginFlowState = 'initial';
      clearMessage();
      renderWelcomeScreen();
    }

    function showMessage(message, type = 'success') {
      const messageArea = document.getElementById('messageArea');
      if (messageArea) {
        messageArea.innerHTML = `<div class="${type}">${message}</div>`;
        setTimeout(() => clearMessage(), 5000);
      }
    }

    function clearMessage() {
      const messageArea = document.getElementById('messageArea');
      if (messageArea) {
        messageArea.innerHTML = '';
      }
    }

    function renderWelcomeScreen() {
      const root = document.getElementById('appRoot');
      root.innerHTML = `
        <div class="card" style="max-width: 600px; margin: 40px auto; text-align: center;">
          <h1 style="margin-bottom: 40px; color: #4544ab; font-size: 2.5rem;">Koperasi Finance</h1>
          <p style="margin-bottom: 32px; font-size: 1.1rem; color: #6c757d;">Welcome to Koperasi Finance</p>
          <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
            <button class="btn" onclick="showEmailLogin()">Sign In</button>
            <button class="btn secondary" onclick="showSignUp()">Create Account</button>
          </div>
          <button class="btn google-btn" onclick="handleGoogleSignIn()" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="#ffffff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#ffffff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            </svg>
            Sign in with Google
          </button>
          <div id="messageArea"></div>
        </div>
      `;
    }

    function handleGoogleSignIn() {
      console.log('Google sign-in clicked');
      showMessage('Google sign-in would open here. For demo, please use the Create Account option.', 'error');
    }

    function handleEmailLogin() {
      console.log('Email login clicked');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      
      if (!email || !password) {
        showMessage('Please enter both email and password.', 'error');
        return;
      }
      
      showMessage('Login functionality would connect to Supabase here.', 'success');
    }

    function handleSignUp() {
      console.log('Signup clicked');
      const fullName = document.getElementById('signupFullName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const phone = document.getElementById('signupPhone').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;
      const agreeTerms = document.getElementById('agreeTerms').checked;
      
      if (!fullName || !email || !phone || !password || !confirmPassword) {
        showMessage('Please fill all required fields.', 'error');
        return;
      }
      
      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }
      
      if (!agreeTerms) {
        showMessage('Please agree to Terms of Service.', 'error');
        return;
      }
      
      showMessage('Account creation would connect to Supabase here.', 'success');
    }

    // Initialize
    renderWelcomeScreen();
  </script>
</body>
</html>
