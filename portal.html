<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koperasi Finance - Production Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #2c3e50; }
    .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 24px; }
    .btn { background: #4544ab; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
    .btn:hover { background: #3d3b9a; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(69,68,171,0.3); }
    .btn.secondary { background: #6c757d; }
    .btn.secondary:hover { background: #5a6268; }
    .btn.warning { background: #ffc107; color: #212529; }
    .btn.warning:hover { background: #e0a800; }
    .input { width: 100%; padding: 12px 16px; border: 2px solid #e1e8ed; border-radius: 8px; font-size: 1rem; transition: all 0.3s ease; }
    .input:focus { border-color: #4544ab; outline: none; box-shadow: 0 0 0 3px rgba(69,68,171,0.1); }
    .flex-row { display: flex; gap: 12px; align-items: center; }
    .user-info-panel { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 16px; margin-bottom: 24px; }
    .badge { background: #28a745; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
    .google-btn { background: #4285f4; }
    .google-btn:hover { background: #3367d6; }
    .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .table th, .table td { padding: 8px; text-align: left; border-bottom: 1px solid #e1e8ed; }
    .table th { background: #f8f9fa; font-weight: 600; }
    .loading { text-align: center; padding: 20px; color: #6c757d; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4544ab; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    .profile-image { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 16px; border: 3px solid #e1e8ed; }
    .upload-btn { background: #28a745; }
    .upload-btn:hover { background: #218838; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app-container" id="appRoot"></div>

  <script>
    // Initialize Supabase - Production Configuration
    const supabaseClient = window.supabase.createClient(
      "https://vkcjwovhnmluzqkgqrbk.supabase.co",
      "sb_publishable_d-klXw8ji6Q0lfm2T7rnTQ_c755YAT6"
    );

    // State management
    let currentUser = null;
    let loginFlowState = "initial";
    let isLoading = false;

    // Production data functions - No demo data
    async function getUsers() {
      try {
        const { data, error } = await supabaseClient
          .from("users")
          .select("*");
        
        if (error) {
          console.error("Error fetching users:", error);
          return [];
        }
        
        return data || [];
      } catch (error) {
        console.error("Database error:", error);
        return [];
      }
    }

    async function getContributions() {
      try {
        const { data, error } = await supabaseClient
          .from("contributions")
          .select("*")
          .eq("memberId", currentUser?.id);
        
        if (error) {
          console.error("Error fetching contributions:", error);
          return [];
        }
        
        return data || [];
      } catch (error) {
        console.error("Database error:", error);
        return [];
      }
    }

    async function getLoans() {
      try {
        const { data, error } = await supabaseClient
          .from("loans")
          .select("*")
          .eq("userId", currentUser?.id);
        
        if (error) {
          console.error("Error fetching loans:", error);
          return [];
        }
        
        return data || [];
      } catch (error) {
        console.error("Database error:", error);
        return [];
      }
    }

    async function getPayments() {
      try {
        const { data, error } = await supabaseClient
          .from("payments")
          .select("*")
          .eq("userId", currentUser?.id);
        
        if (error) {
          console.error("Error fetching payments:", error);
          return [];
        }
        
        return data || [];
      } catch (error) {
        console.error("Database error:", error);
        return [];
      }
    }

    // Image upload function
    async function uploadImage(file) {
      if (!file) {
        showMessage("Please select an image to upload.", "error");
        return null;
      }

      const fileExt = file.name.split(".").pop();
      const fileName = `${currentUser.id}_${Date.now()}.${fileExt}`;
      
      try {
        const { data, error } = await supabaseClient.storage
          .from("user-images")
          .upload(fileName, file, {
            cacheControl: "3600",
            upsert: false
          });

        if (error) {
          console.error("Upload error:", error);
          showMessage("Image upload failed: " + error.message, "error");
          return null;
        }

        const { data: { publicUrl } } = supabaseClient.storage
          .from("user-images")
          .getPublicUrl(fileName);

        return publicUrl;
      } catch (error) {
        console.error("Upload error:", error);
        showMessage("Image upload failed: " + error.message, "error");
        return null;
      }
    }

    // Authentication functions
    async function signInWithGoogle() {
      try {
        showLoading(true);
        const { data, error } = await supabaseClient.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: window.location.origin + "/portal.html"
          }
        });

        if (error) {
          showMessage("Google sign-in failed: " + error.message, "error");
        } else {
          currentUser = data.user;
          loginFlowState = "initial";
          showMessage("Successfully signed in with Google!", "success");
          setTimeout(() => render(), 1000);
        }
      } catch (error) {
        showMessage("Authentication error: " + error.message, "error");
      } finally {
        showLoading(false);
      }
    }

    async function signInWithEmail(email, password) {
      try {
        showLoading(true);
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          showMessage("Login failed: " + error.message, "error");
        } else {
          // Get user profile data
          const { data: userData } = await supabaseClient
            .from("users")
            .select("*")
            .eq("email", email)
            .single();

          if (userData) {
            currentUser = { ...data.user, ...userData };
            loginFlowState = "initial";
            showMessage("Login successful!", "success");
            setTimeout(() => render(), 1000);
          } else {
            showMessage("User profile not found. Please contact administrator.", "error");
          }
        }
      } catch (error) {
        showMessage("Authentication error: " + error.message, "error");
      } finally {
        showLoading(false);
      }
    }

    async function signUpWithEmail(userData) {
      try {
        showLoading(true);
        const { data, error } = await supabaseClient.auth.signUp({
          email: userData.email,
          password: userData.password,
          options: {
            data: {
              full_name: userData.fullName,
              role: userData.role || "nonmember",
              phone: userData.phone
            }
          }
        });

        if (error) {
          showMessage("Registration failed: " + error.message, "error");
        } else {
          // Create user profile
          const { error: profileError } = await supabaseClient
            .from("users")
            .insert({
              id: data.user.id,
              email: userData.email,
              full_name: userData.fullName,
              role: userData.role || "nonmember",
              phone: userData.phone,
              created_at: new Date().toISOString()
            });

          if (profileError) {
            showMessage("Profile creation failed: " + profileError.message, "error");
          } else {
            currentUser = { ...data.user, ...userData };
            loginFlowState = "initial";
            showMessage("Registration successful! Welcome to Koperasi Finance.", "success");
            setTimeout(() => render(), 1000);
          }
        }
      } catch (error) {
        showMessage("Registration error: " + error.message, "error");
      } finally {
        showLoading(false);
      }
    }

    async function signOut() {
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) {
          console.error("Sign out error:", error);
        }
        currentUser = null;
        loginFlowState = "initial";
        showMessage("Logged out successfully!", "success");
        setTimeout(() => render(), 1000);
      } catch (error) {
        console.error("Sign out error:", error);
      }
    }

    // Render functions
    function renderWelcomeScreen() {
      return `
        <div class="card" style="max-width: 600px; margin: 40px auto; text-align: center;">
          <h1 style="margin-bottom: 40px; color: #4544ab; font-size: 2.5rem;">Koperasi Finance</h1>
          <p style="margin-bottom: 32px; font-size: 1.1rem; color: #6c757d;">Welcome to Koperasi Finance</p>
          <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
            <button class="btn" onclick="showEmailLogin()">Sign In</button>
            <button class="btn secondary" onclick="showSignUp()">Create Account</button>
          </div>
          <button class="btn google-btn" onclick="handleGoogleSignIn()" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="#ffffff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#ffffff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            </svg>
            Sign in with Google
          </button>
          <div id="messageArea"></div>
        </div>
      `;
    }

    function renderEmailLoginScreen() {
      return `
        <div class="card" style="max-width: 450px; margin: 40px auto; text-align: center;">
          <button class="logout-btn" onclick="showWelcome()">← Back</button>
          <h2 style="margin: 20px 0;">Sign In</h2>
          <div style="margin-top: 20px;">
            <input type="email" id="loginEmail" placeholder="Email address" class="input" style="margin-bottom: 12px;" />
            <input type="password" id="loginPassword" placeholder="Password" class="input" />
            <button class="btn" onclick="handleEmailLogin()" style="margin-top: 20px; width: 100%;">Sign In</button>
          </div>
          <div id="messageArea"></div>
        </div>
      `;
    }

    function renderSignUpScreen() {
      return `
        <div class="card" style="max-width: 500px; margin: 40px auto; text-align: center;">
          <button class="logout-btn" onclick="showWelcome()">← Back</button>
          <h2 style="margin: 20px 0;">Create Account</h2>
          <div style="margin-top: 20px;">
            <input type="text" id="signupFullName" placeholder="Full Name" class="input" style="margin-bottom: 12px;" />
            <input type="email" id="signupEmail" placeholder="Email address" class="input" style="margin-bottom: 12px;" />
            <input type="tel" id="signupPhone" placeholder="Phone Number" class="input" style="margin-bottom: 12px;" />
            <input type="password" id="signupPassword" placeholder="Password" class="input" style="margin-bottom: 12px;" />
            <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" class="input" style="margin-bottom: 12px;" />
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
              <label style="display: flex; align-items: center; font-size: 0.9rem;">
                <input type="checkbox" id="agreeTerms" style="margin-right: 8px;">
                I agree to Terms of Service and Privacy Policy
              </label>
            </div>
            <button class="btn" onclick="handleSignUp()" style="margin-top: 20px; width: 100%;">Create Account</button>
          </div>
          <div id="messageArea"></div>
        </div>
      `;
    }

    function renderDashboard() {
      return `
        <div class="card">
          <button class="logout-btn" onclick="handleLogout()">← Logout</button>
          <div class="user-info-panel">
            <div style="display: flex; align-items: center; gap: 20px;">
              <div>
                ${currentUser?.user_metadata?.avatar_url ? 
                  `<img src="${currentUser.user_metadata.avatar_url}" alt="Profile" class="profile-image">` : 
                  `<div style="width: 80px; height: 80px; border-radius: 50%; background: #e1e8ed; display: flex; align-items: center; justify-content: center; color: #6c757d; font-size: 0.9rem;">👤</div>`
                }
              </div>
              <div>
                <strong>👤 ${currentUser?.user_metadata?.full_name || "User"}</strong><br>
                <span style="font-size:0.75rem;">${currentUser?.email || "No email"}</span>
              </div>
            </div>
            <div><span class="badge">${currentUser?.user_metadata?.role || "Member"}</span></div>
            <div style="margin-top: 16px;">
              <input type="file" id="imageUpload" accept="image/*" style="display: none;" />
              <button class="btn upload-btn" onclick="document.getElementById("imageUpload").click()" style="margin-right: 12px;">📷 Upload Photo</button>
            </div>
          </div>
          <div id="dashboardContent">
            <div class="loading">
              <div class="spinner"></div>
              <p>Loading your dashboard...</p>
            </div>
          </div>
          <div id="messageArea"></div>
        </div>
      `;
    }

    // Navigation functions
    function showWelcome() { loginFlowState = "initial"; clearMessage(); render(); }
    function showEmailLogin() { loginFlowState = "emailLogin"; clearMessage(); render(); }
    function showSignUp() { loginFlowState = "signUp"; clearMessage(); render(); }

    // Message functions
    function showMessage(message, type = "success") {
      const messageArea = document.getElementById("messageArea");
      if (messageArea) {
        messageArea.innerHTML = `<div class="${type}">${message}</div>`;
        setTimeout(() => clearMessage(), 5000);
      }
    }

    function clearMessage() {
      const messageArea = document.getElementById("messageArea");
      if (messageArea) {
        messageArea.innerHTML = "";
      }
    }

    function showLoading(show) {
      isLoading = show;
      // Loading state is handled in render functions
    }

    // Event handlers
    async function handleGoogleSignIn() {
      await signInWithGoogle();
    }

    async function handleEmailLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      
      if (!email || !password) {
        showMessage("Please enter both email and password.", "error");
        return;
      }
      
      await signInWithEmail(email, password);
    }

    async function handleSignUp() {
      const fullName = document.getElementById("signupFullName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const phone = document.getElementById("signupPhone").value.trim();
      const password = document.getElementById("signupPassword").value;
      const confirmPassword = document.getElementById("signupConfirmPassword").value;
      const agreeTerms = document.getElementById("agreeTerms").checked;
      
      if (!fullName || !email || !phone || !password || !confirmPassword) {
        showMessage("Please fill all required fields.", "error");
        return;
      }
      
      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }
      
      if (!agreeTerms) {
        showMessage("Please agree to Terms of Service.", "error");
        return;
      }
      
      await signUpWithEmail({
        fullName,
        email,
        phone,
        password,
        role: "member"
      });
    }

    async function handleLogout() {
      await signOut();
    }

    async function handleImageUpload() {
      const fileInput = document.getElementById("imageUpload");
      const file = fileInput.files[0];
      
      if (!file) {
        showMessage("Please select an image to upload.", "error");
        return;
      }

      // Check file size (5MB limit)
      if (file.size > 5 * 1024 * 1024) {
        showMessage("Image size must be less than 5MB.", "error");
        return;
      }

      // Check file type
      const allowedTypes = ["image/jpeg", "image/png", "image/gif"];
      if (!allowedTypes.includes(file.type)) {
        showMessage("Only JPEG, PNG, and GIF images are allowed.", "error");
        return;
      }

      showLoading(true);
      
      try {
        const publicUrl = await uploadImage(file);
        
        if (publicUrl) {
          // Update user profile with avatar URL
          const { error } = await supabaseClient
            .from("users")
            .update({
              avatar_url: publicUrl
            })
            .eq("id", currentUser.id);

          if (error) {
            showMessage("Profile update failed: " + error.message, "error");
          } else {
            // Update current user data
            currentUser.user_metadata = { ...currentUser.user_metadata, avatar_url: publicUrl };
            showMessage("Profile picture updated successfully!", "success");
            setTimeout(() => render(), 1000);
          }
        }
      } catch (error) {
        showMessage("Image upload failed: " + error.message, "error");
      } finally {
        showLoading(false);
      }
    }

    // Load dashboard content
    async function loadDashboardContent() {
      if (!currentUser) return;
      
      try {
        const [contributions, loans, payments] = await Promise.all([
          getContributions(),
          getLoans(),
          getPayments()
        ]);
        
        const activeLoan = loans.find(l => l.status === "active");
        
        const dashboardContent = document.getElementById("dashboardContent");
        if (dashboardContent) {
          dashboardContent.innerHTML = `
            <h3>💰 Make Contribution</h3>
            <div class="flex-row">
              <input type="number" id="contribAmt" placeholder="Contribution amount $" class="input" style="flex: 1;" />
              <button class="btn" onclick="handleContribution()">Contribute</button>
            </div>
            <h3>🏦 Apply for Loan</h3>
            <div class="flex-row">
              <input type="number" id="loanAmt" placeholder="Loan amount $" class="input" style="flex: 1;" />
              <button class="btn" onclick="handleLoan()">Apply Loan</button>
            </div>
            ${activeLoan ? `
              <div style="background:#eff6ff; border-radius:24px; padding:16px; margin-top:20px;">
                <strong>📌 Active Loan:</strong> Remaining $${activeLoan.remaining_balance?.toFixed(2)} · Interest $${(activeLoan.remaining_balance * 0.08).toFixed(2)}
                <div class="flex-row">
                  <input type="number" id="repayVal" placeholder="Repayment $" class="input" style="flex: 1;" />
                  <button class="btn secondary" onclick="handleRepayment()">Repay</button>
                </div>
              </div>
            ` : "<p>✅ No active loan</p>"}
            <h3>📜 Recent Activity</h3>
            <table class="table">
              <tr><th>Date</th><th>Type</th><th>Amount</th></tr>
              ${contributions.slice(-4).reverse().map(c=>`<tr><td>${new Date(c.created_at).toLocaleDateString()}</td><td>Contribution</td><td>$${c.amount}</td></tr>`).join("")}
              ${payments.slice(-4).reverse().map(p=>`<tr><td>${new Date(p.created_at).toLocaleDateString()}</td><td>Loan Payment</td><td>$${p.amount}</td></tr>`).join("")}
            </table>
          `;
        }
      } catch (error) {
        console.error("Dashboard loading error:", error);
        const dashboardContent = document.getElementById("dashboardContent");
        if (dashboardContent) {
          dashboardContent.innerHTML = "<p style=\"color: #dc3545;\">Error loading dashboard. Please try again.</p>";
        }
      }
    }

    // Dashboard action handlers
    async function handleContribution() {
      const amount = parseFloat(document.getElementById("contribAmt").value);
      if (amount <= 0) {
        showMessage("Please enter a valid contribution amount.", "error");
        return;
      }
      
      try {
        const { error } = await supabaseClient
          .from("contributions")
          .insert({
            member_id: currentUser.id,
            amount: amount,
            created_at: new Date().toISOString()
          });

        if (error) {
          showMessage("Contribution failed: " + error.message, "error");
        } else {
          showMessage(`Contribution of $${amount} recorded successfully!`, "success");
          document.getElementById("contribAmt").value = "";
          await loadDashboardContent();
        }
      } catch (error) {
        showMessage("Contribution error: " + error.message, "error");
      }
    }

    async function handleLoan() {
      const amount = parseFloat(document.getElementById("loanAmt").value);
      if (amount <= 0) {
        showMessage("Please enter a valid loan amount.", "error");
        return;
      }
      
      try {
        const { error } = await supabaseClient
          .from("loans")
          .insert({
            user_id: currentUser.id,
            amount: amount,
            remaining_balance: amount,
            status: "active",
            date_taken: new Date().toISOString(),
            interest_rate: 0.08
          });

        if (error) {
          showMessage("Loan application failed: " + error.message, "error");
        } else {
          showMessage(`Loan application for $${amount} submitted successfully!`, "success");
          document.getElementById("loanAmt").value = "";
          await loadDashboardContent();
        }
      } catch (error) {
        showMessage("Loan application error: " + error.message, "error");
      }
    }

    async function handleRepayment() {
      const amount = parseFloat(document.getElementById("repayVal").value);
      if (amount <= 0) {
        showMessage("Please enter a valid repayment amount.", "error");
        return;
      }
      
      try {
        const loans = await getLoans();
        const activeLoan = loans.find(l => l.status === "active");
        
        if (!activeLoan) {
          showMessage("No active loan found.", "error");
          return;
        }
        
        // Add payment
        const { error: paymentError } = await supabaseClient
          .from("payments")
          .insert({
            loan_id: activeLoan.id,
            user_id: activeLoan.user_id,
            amount: amount,
            created_at: new Date().toISOString(),
            payment_type: "principal"
          });

        if (paymentError) {
          showMessage("Payment failed: " + paymentError.message, "error");
          return;
        }
        
        // Update loan balance
        const newBalance = activeLoan.remaining_balance - amount;
        const { error: updateError } = await supabaseClient
          .from("loans")
          .update({
            remaining_balance: newBalance,
            status: newBalance <= 0 ? "completed" : "active"
          })
          .eq("id", activeLoan.id);

        if (updateError) {
          showMessage("Loan update failed: " + updateError.message, "error");
        } else {
          showMessage(`Repayment of $${amount} recorded successfully!`, "success");
          document.getElementById("repayVal").value = "";
          await loadDashboardContent();
        }
      } catch (error) {
        showMessage("Repayment error: " + error.message, "error");
      }
    }

    // Main render function
    async function render() {
      const root = document.getElementById("appRoot");
      
      if (loginFlowState === "initial") {
        if (currentUser) {
          root.innerHTML = renderDashboard();
          // Load dashboard content after rendering
          setTimeout(() => loadDashboardContent(), 100);
        } else {
          root.innerHTML = renderWelcomeScreen();
        }
      } else if (loginFlowState === "emailLogin") {
        root.innerHTML = renderEmailLoginScreen();
      } else if (loginFlowState === "signUp") {
        root.innerHTML = renderSignUpScreen();
      }
    }

    // Check for existing session on load
    async function initializeApp() {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        if (session?.user) {
          currentUser = session.user;
          loginFlowState = "initial";
        } else {
          loginFlowState = "initial";
        }
        
        render();
      } catch (error) {
        console.error("Initialization error:", error);
        loginFlowState = "initial";
        render();
      }
    }

    // Initialize app
    initializeApp();
  </script>
