<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koperasi Finance - Redirect to Portal</title>
  <script>
    // Handle routing for SPA
    const path = window.location.pathname;
    
    if (path === '/' || path === '/index.html') {
      // Redirect to portal for root access
      window.location.replace('/portal.html');
    } else if (path === '/portal' || path === '/portal/') {
      // Redirect to portal.html for /portal path
      window.location.replace('/portal.html');
    } else {
      // Default redirect to portal
      window.location.replace('/portal.html');
    }
  </script>
</head>
<body>
  <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div style="text-align: center;">
      <h1 style="color: #4544ab; margin-bottom: 20px;">Koperasi Finance</h1>
      <p style="color: #6c757d; margin-bottom: 20px;">Redirecting to member portal...</p>
      <div style="width: 40px; height: 40px; border: 4px solid #4544ab; border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
    </div>
  </div>
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
